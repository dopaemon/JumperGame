name: Android Release Build

on:
  workflow_dispatch:
  push:
    branches: ["main", "try"]
  pull_request:
    branches: ["main"]

jobs:
  build-android-release:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-Android-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-Android-
      - name: Setup Swap Space
        uses: thejerrybao/setup-swap-space@v1
        with:
          swap-space-path: /swapfile
          swap-size-gb: 32
          remove-existing-swap-files: true

      - name: Tune Swap Aggressiveness
        run: |
          set -euo pipefail
          sudo sysctl -w vm.swappiness=200
          sudo sysctl -w vm.page-cluster=0
          sudo swapoff /swapfile || true
          sudo swapon -p 32767 /swapfile
          echo "===== Swap Tuning ====="
          cat /proc/sys/vm/swappiness
          cat /proc/sys/vm/page-cluster
          swapon --show --bytes
      - name: Build Android Release (unsigned, Personal license)
        uses: game-ci/unity-builder@v4
        env:
          # Personal license: only use UNITY_LICENSE.
          # Do not pass serial/email/password.
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: Android
          buildName: JumperGame
          allowDirtyBuild: false
          androidExportType: androidPackage

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-unsigned
          path: build/Android
          if-no-files-found: error


